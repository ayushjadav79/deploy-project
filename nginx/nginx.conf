server {
    listen 80;

    # Use Docker's internal DNS resolver so upstream IPs are re-resolved
    # dynamically after container restarts (prevents 502 on redeploy)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Increase timeouts to handle slow backend startup / heavy queries
    proxy_connect_timeout   30s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # Frontend — variable forces runtime DNS resolution
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API — strip /api prefix before forwarding to FastAPI
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow cookies to flow through
        proxy_pass_header Set-Cookie;

        # Increase buffer sizes for larger API responses
        proxy_buffer_size          16k;
        proxy_buffers              4 16k;
    }
}