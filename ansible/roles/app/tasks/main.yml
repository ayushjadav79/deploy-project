---
- name: Create app directory
  file:
    path: /home/azureuser/app
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: /home/azureuser/app/docker-compose.yml
    owner: azureuser
    group: azureuser
    mode: '0644'

# ACR login using the VM's System-Assigned Managed Identity
# The VM has AcrPull role assigned via Terraform — no credentials needed!
- name: Login to ECR using Managed Identity
  shell: |
    az login --identity
    az acr login --name {{ acr_name }}
  become: false
  become_user: azureuser

- name: Pull latest images
  shell: |
    cd /home/azureuser/app
    docker compose pull
  become: false
  become_user: azureuser

# Create directories and copy ALL config files before starting containers.
# If prometheus.yml does not exist when docker compose up runs, Docker will
# auto-create a directory at that path, making the bind-mount fail with
# "not a directory" because the compose file maps it as a file, not a volume.
- name: Create grafana provisioning directories
  file:
    path: "{{ item }}"
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'
  loop:
    - /home/azureuser/app/grafana
    - /home/azureuser/app/grafana/provisioning
    - /home/azureuser/app/grafana/provisioning/datasources
    - /home/azureuser/app/grafana/provisioning/dashboards

- name: Copy Prometheus config
  copy:
    src: prometheus.yml
    dest: /home/azureuser/app/prometheus.yml
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Copy Grafana datasource config
  copy:
    src: grafana-datasource.yml
    dest: /home/azureuser/app/grafana/provisioning/datasources/prometheus.yml
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Copy Grafana dashboard provider config
  copy:
    src: grafana-dashboard-provider.yml
    dest: /home/azureuser/app/grafana/provisioning/dashboards/provider.yml
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Start / restart services
  shell: |
    cd /home/azureuser/app
    docker compose up -d --remove-orphans
  become: false
  become_user: azureuser